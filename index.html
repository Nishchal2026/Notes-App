<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <!-- Header section  -->

    <header>
        <h1>Quiz-Notes</h1>
        <div class="header-buttons">
            <div class="add-note-button">
                <button id="add-note" onclick="openNoteDialog()">Add Note</button>
            </div>
            <h1>Maximum : 8 Notes</h1>
            <div class="background-buttons">

                <button id="normal" onclick="changeNormal()" >Normal</button>
                <button id="dark" onclick="changeDark()">Dark</button>
                <button id="gradient" onclick="changeGradient()">Gradient</button>
            </div>
        </div>
    </header>

    <!-- Main section  -->

    <main>
        <div class="notes-container">

        </div>
    </main>

    <!-- Dialog Box  -->

    <dialog>
        <div class="dialog-content">
            <div class="dialog-header">
                <h2>Add Note</h2>
                <button onclick="closeNoteDialog()">X</button>
            </div> 
            <form>
                <div class="form-group">
                    <label for="titleNote">Enter Title : </label>
                    <input type="text" id="titleNote">
                </div>
                <div class="form-group">
                    <label for="contentNote">Enter Content : </label>
                    <textarea id="contentNote"></textarea>
                </div>
                <div class="dialog-action">
                    <button type="button" class="cancel-dialog" onclick="closeNoteDialog()">Cancel</button>
                    <button type="submit" class="add-note-btn">Add Note</button>
                </div>
            </form>
        </div>
    </dialog>
     

    <script src="./script.js"></script>
</body>
</html>
